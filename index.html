<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div>
            <ul class="navbar-left-element">
                <li>About</li>
                <li>Store</li>
            </ul>
        </div>
        <div class="navbar-right-element">
            <div>
                <ul class="right-element-content">
                    <li>Gmail</li>
                    <li>Images</li>
                </ul>
            </div>
            <div>
                <ul class="right-element-symbol">
                    <li><img src="images/beaker logo.svg" alt=""></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <div class="main-content">
            <div class="google-logo">
                <img src="images/google logo.svg" alt="">
            </div>

            <div class="search-bar">
                <div class="plus-logo">
                    <img class="logo" src="images/plus symbol.svg" alt="">
                    <input type="text" id="search" name="search" class="search">
                </div>

                <div class="search-bar-right">
                    <div class="search-bar-right-symbol">
                        <div>
                            <img class="logo" src="images/mice symbol.svg" alt="">
                        </div>
                        <div>
                            <img class="logo" src="images/lens symbol.svg" alt="">
                        </div>
                    </div>
                    <div class="ai-tool-box">
                        <div>
                            <img class="logo" src="images/ai-tool symbol.svg" alt="">
                        </div>
                        <div class="AI-mode-button">
                            <p>AI Mode</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-content-option">
                <div class="content-option-1">
                    <p>Google Search</p>
                </div>
                <div class="content-option-2">
                    <p>Im Feeling Lucky</p>
                </div>
            </div>

            <div class="language-option">
                <div class="language-facility">
                    <p>Google offered in:</p>
                </div>
                <div>
                    <ul class="language-option-list">
                        <li><a href="#">हिन्दी</a></li>
                        <li><a href="#">বাংলা</a></li>
                        <li><a href="#">తెలుగు</a></li>
                        <li><a href="#">मराठी</a></li>
                        <li><a href="#">தமிழ்</a></li>
                        <li><a href="#">ગુજરાતી</a></li>
                        <li><a href="#">ಕನ್ನಡ</a></li>
                        <li><a href="#">മലയാളം</a></li>
                        <li><a href="#">ਪੰਜਾਬੀ</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
